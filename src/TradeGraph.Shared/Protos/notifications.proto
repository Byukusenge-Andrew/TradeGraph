syntax = "proto3";

option csharp_namespace = "TradeGraph.Shared.Protos";

package notifications;

service NotificationGrpc {
  rpc SendAlert (SendAlertRequest) returns (SendAlertResponse);
  rpc BroadcastPriceChange (BroadcastRequest) returns (BroadcastResponse);
}

message SendAlertRequest {
  string alert_id = 1;
  string title = 2;
  string message = 3;
  string severity = 4;
  string region = 5;
  repeated string recipient_emails = 6;
}

message SendAlertResponse {
  bool success = 1;
  int32 notifications_sent = 2;
  string sent_at = 3;
}

message BroadcastRequest {
  string product_id = 1;
  string product_name = 2;
  double old_price = 3;
  double new_price = 4;
  string region = 5;
}

message BroadcastResponse {
  bool success = 1;
  int32 retailers_notified = 2;
}
